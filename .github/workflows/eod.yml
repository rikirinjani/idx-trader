name: EOD Trading Bot

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-eod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install yfinance pandas schedule
      - run: python scheduler.py eod
      - run: python export_report.py
      - name: Commit results
        run: |
          git config user.name "IDX Bot"
          git config user.email "bot@idx-trader.local"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add trading.db reports/
          git diff --cached --quiet || git commit -m "eod: auto-run $(date +'%Y-%m-%d')"
          git push
