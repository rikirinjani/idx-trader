name: EOD Trading Bot

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 16:00 WIB = 09:00 UTC, Mon-Fri
  workflow_dispatch:  # allow manual trigger

jobs:
  run-eod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance pandas schedule

      - name: Run EOD strategy
        run: python scheduler.py eod

      - name: Export report
        run: python export_report.py

      - name: Commit results
        run: |
          git config user.name "IDX Bot"
          git config user.email "bot@idx-trader.local"
          git add trading.db reports/
          git diff --cached --quiet || git commit -m "eod: auto-run $(date +'%Y-%m-%d')"
          git push
